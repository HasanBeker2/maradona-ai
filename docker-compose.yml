services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maradona
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: maradona
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maradona"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://maradona:${POSTGRES_PASSWORD}@postgres:5432/maradona
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BASECAMP_ACCESS_TOKEN: ${BASECAMP_ACCESS_TOKEN}
      BASECAMP_CLIENT_ID: ${BASECAMP_CLIENT_ID}
      BASECAMP_CLIENT_SECRET: ${BASECAMP_CLIENT_SECRET}
      BASECAMP_ACCOUNT_ID: ${BASECAMP_ACCOUNT_ID}
      BASECAMP_PROJECT_ID: ${BASECAMP_PROJECT_ID}
      BASECAMP_TODOLIST_ID: ${BASECAMP_TODOLIST_ID}
      API_SECRET: ${API_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      BASECAMP_REDIRECT_URI: ${BASECAMP_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      PORT: 3000
      NODE_ENV: production
      SUMMARY_CRON: ${SUMMARY_CRON:-0 20 * * 0}
      TZ: ${TZ:-Europe/Istanbul}
      PRIVACY_NOTICE_TEXT: ${PRIVACY_NOTICE_TEXT:-}
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      WWEBJS_AUTH_PATH: /app/.wwebjs_auth
    volumes:
      - wwebjs_auth:/app/.wwebjs_auth
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      API_URL: http://backend:3000
      NEXT_PUBLIC_API_URL: ""
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - backend
    ports:
      - "3001:3000"

volumes:
  postgres_data:
  wwebjs_auth:
